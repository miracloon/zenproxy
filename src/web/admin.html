<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenProxy 管理后台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --primary:#6c63ff; --primary-hover:#5a52e0; --success:#22c55e; --danger:#ef4444; --warn:#f59e0b; --text:#e2e8f0; --text-dim:#94a3b8; --text-bright:#f8fafc; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:20px; color:var(--text-bright); }
.header .nav a { color:var(--text-dim); text-decoration:none; margin-left:16px; padding:6px 12px; border-radius:6px; transition:all .2s; }
.header .nav a:hover, .header .nav a.active { color:var(--primary); background:rgba(108,99,255,.1); }
.container { max-width:1400px; margin:0 auto; padding:24px; }
.section { margin-bottom:32px; }
.section-title { font-size:16px; font-weight:600; color:var(--text-bright); margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; overflow-x:auto; margin-bottom:24px;}
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:768px) { .grid-2 { grid-template-columns:1fr; } }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 12px; background:#0f1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border .2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group input[type="checkbox"] { width: auto; display: inline-block; vertical-align: middle; margin-right: 8px;}
.form-group textarea { resize:vertical; min-height:80px; }
.btn { padding:10px 20px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:.85; }
.btn-warn { background:var(--warn); color:#000; }
.btn-warn:hover { opacity:.85; }
.btn-warning { background:var(--warn); color:#fff; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:.85; }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-xs { padding:4px 8px; font-size:11px; border-radius:4px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer;}
.btn-xs:hover { border-color:var(--primary); }
.btn-xs.btn-success { background:var(--success); color:#fff; border-color:var(--success);}
.btn-xs.btn-warning { background:var(--warn); color:#fff; border-color:var(--warn);}
.btn-xs.btn-danger { background:var(--danger); color:#fff; border-color:var(--danger);}
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; white-space:nowrap; }
th { color:var(--text-dim); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; user-select:none; }
th:hover { color:var(--text); }
th.sorted-asc::after { content:' ↑'; }
th.sorted-desc::after { content:' ↓'; }
tr:hover td { background:rgba(108,99,255,.03); }
.badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600; }
.badge-valid { background:rgba(34,197,94,.15); color:var(--success); }
.badge-invalid { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-untested { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-disabled { background:#374151; color:#9ca3af; }
.badge-type { background:rgba(108,99,255,.15); color:var(--primary); }
.badge-quality { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-risk-low { background:rgba(34,197,94,.15); color:var(--success); }
.badge-risk-med { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-risk-high { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-banned { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-active { background:rgba(34,197,94,.15); color:var(--success); }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.stat-value { font-size:28px; font-weight:700; color:var(--text-bright); }
.stat-label { font-size:12px; color:var(--text-dim); margin-top:4px; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:14px; z-index:999; animation:slideIn .3s ease; }
@keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.filter-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-bar input, .filter-bar select { padding:8px 12px; background:#0f1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
.filter-bar input:focus, .filter-bar select:focus { border-color:var(--primary); }
.empty { text-align:center; color:var(--text-dim); padding:40px; }
.type-chips { display:flex; gap:8px; flex-wrap:wrap; }
.type-chip { padding:4px 10px; border-radius:6px; font-size:12px; background:rgba(108,99,255,.1); color:var(--primary); }
.api-key-cell { max-width:120px; overflow:hidden; text-overflow:ellipsis; font-family:'Consolas','Courier New',monospace; font-size:11px; }
.pagination { display:flex; align-items:center; justify-content:center; gap:4px; padding:16px 0 0; flex-wrap:wrap; }
.pagination button { background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; transition:all .2s; }
.pagination button:hover { border-color:var(--primary); color:var(--primary); }
.pagination button.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.pagination button:disabled { opacity:.4; cursor:default; }
.pagination .page-info { font-size:13px; color:var(--text-dim); margin:0 8px; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; padding: 16px 20px; border-bottom: 1px solid var(--border); margin-bottom:20px; flex-wrap: wrap;}
.tab { background: transparent; border: none; color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; color: var(--text-dim);}
.tab.active { background: var(--primary); color: #fff; }
.tab:hover:not(.active) { background: var(--bg); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-link { margin-left: auto; color: var(--text-dim); text-decoration: none; padding: 8px 16px; transition: color 0.2s;}
.tab-link:hover { color: var(--text); }

/* specific */
.settings-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:24px; }
.settings-card h3 { font-size:16px; color:var(--text-bright); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.row-disabled { opacity: 0.5; }
.input-sm { padding:4px 8px; font-size:12px; border-radius:4px; background:#0f1117; border:1px solid var(--border); color:var(--text); width: 100%; outline:none;}
.input-sm:focus { border-color:var(--primary); }
.url-cell { max-width:200px; overflow:hidden; text-overflow:ellipsis; }

/* Admin access denied */
.access-denied { text-align: center; padding: 100px 20px; }
.access-denied h2 { font-size: 24px; color: var(--danger); margin-bottom: 16px; }
.access-denied p { color: var(--text-dim); margin-bottom: 24px; }
.access-denied a { color: var(--primary); text-decoration: none; }
.access-denied a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="app" style="display:none">
<div class="header">
  <h1>ZenProxy 管理后台</h1>
  <div class="nav">
    <a href="javascript:void(0)" onclick="logout()" style="color:var(--text-dim)">退出登录</a>
  </div>
</div>

<div class="tab-bar">
    <button class="tab active" data-tab="subscriptions" onclick="switchTab('subscriptions')">
        📡 订阅与节点管理
    </button>
    <button class="tab" data-tab="users" onclick="switchTab('users')">
        👥 用户管理
    </button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')">
        ⚙️ 系统设置
    </button>
    <a href="/" class="tab-link">← 返回仪表盘</a>
</div>

<div class="container">
    <div class="tab-content active" id="tab-subscriptions">
        <!-- Stats -->
        <div class="stat-grid" id="stats">
            <div class="stat-card"><div class="stat-value" id="s-total">-</div><div class="stat-label">总代理数</div></div>
            <div class="stat-card"><div class="stat-value" id="s-valid">-</div><div class="stat-label">有效</div></div>
            <div class="stat-card"><div class="stat-value" id="s-invalid">-</div><div class="stat-label">无效</div></div>
            <div class="stat-card"><div class="stat-value" id="s-untested">-</div><div class="stat-label">待检测</div></div>
            <div class="stat-card"><div class="stat-value" id="s-subs">-</div><div class="stat-label">订阅源</div></div>
            <div class="stat-card"><div class="stat-value" id="s-quality">-</div><div class="stat-label">已质检</div></div>
            <div class="stat-card"><div class="stat-value" id="s-chatgpt">-</div><div class="stat-label">ChatGPT</div></div>
            <div class="stat-card"><div class="stat-value" id="s-google">-</div><div class="stat-label">Google</div></div>
            <div class="stat-card"><div class="stat-value" id="s-residential">-</div><div class="stat-label">住宅IP</div></div>
        </div>

        <div class="grid-2">
           <div class="section">
             <div class="section-title">操作</div>
             <div class="btn-group">
               <button class="btn btn-primary" onclick="triggerValidation()">验证全部</button>
               <button class="btn btn-primary" onclick="triggerQualityCheck()">质检全部</button>
               <button class="btn btn-danger" onclick="cleanupProxies()">清理无效</button>
               <button class="btn btn-danger" onclick="cleanupUselessProxies()">清理三不通</button>
             </div>
           </div>
           <div class="section">
             <div class="section-title">类型分布</div>
             <div class="type-chips" id="type-chips"></div>
           </div>
        </div>

        <!-- Add & List Subscriptions -->
        <div class="section">
            <div class="section-title">订阅源</div>
            <div class="card" style="margin-bottom: 16px;">
                <div class="grid-2">
                    <div>
                        <div class="form-group">
                            <label>名称</label>
                            <input id="add-sub-name" placeholder="我的代理列表">
                        </div>
                        <div class="form-group">
                            <label>类型</label>
                            <select id="add-sub-type">
                                <option value="auto">自动检测</option>
                                <option value="v2ray">V2Ray URI</option>
                                <option value="clash">Clash YAML</option>
                                <option value="base64">Base64</option>
                                <option value="socks5">SOCKS5 (纯文本)</option>
                                <option value="socks4">SOCKS4 (纯文本)</option>
                                <option value="http">HTTP (纯文本)</option>
                                <option value="https">HTTPS (纯文本)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>URL (二选一)</label>
                            <input id="add-sub-url" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label>文本内容 (二选一)</label>
                            <textarea id="add-sub-content" placeholder="在此粘贴订阅内容..." style="min-height: 48px;"></textarea>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="adminAddSubscription()">+ 添加订阅</button>
            </div>
            
            <div class="card">
                <table>
                    <thead><tr><th>名称</th><th>URL</th><th>代理数</th><th>操作</th></tr></thead>
                    <tbody id="sub-table"></tbody>
                </table>
                <div class="empty" id="sub-empty">暂无订阅源</div>
            </div>
        </div>

        <!-- Proxy Table -->
        <div class="section">
            <div class="section-title">
                <span>代理列表 <span id="proxy-count" style="font-weight:400;color:var(--text-dim)"></span></span>
            </div>
            <div class="filter-bar">
                <input id="f-search" placeholder="搜索名称/服务器..." oninput="currentPage=1;renderProxies()">
                <select id="f-status" onchange="currentPage=1;renderProxies()">
                    <option value="">全部状态</option>
                    <option value="valid">有效</option>
                    <option value="invalid">无效</option>
                    <option value="untested">待检测</option>
                    <option value="disabled">已禁用</option>
                </select>
                <select id="f-type" onchange="currentPage=1;renderProxies()">
                    <option value="">全部类型</option>
                    <option value="vmess">VMess</option>
                    <option value="vless">VLESS</option>
                    <option value="trojan">Trojan</option>
                    <option value="shadowsocks">Shadowsocks</option>
                    <option value="hysteria2">Hysteria2</option>
                </select>
                <select id="f-quality" onchange="currentPage=1;renderProxies()">
                    <option value="">全部质量</option>
                    <option value="chatgpt">ChatGPT 可用</option>
                    <option value="google">Google 可用</option>
                    <option value="residential">Residential</option>
                </select>
            </div>
            <div class="card">
                <table>
                    <thead><tr>
                        <th onclick="sortBy('name')">名称</th>
                        <th onclick="sortBy('type')">类型</th>
                        <th onclick="sortBy('server')">服务器</th>
                        <th onclick="sortBy('is_valid')">状态</th>
                        <th onclick="sortBy('error_count')">错误</th>
                        <th>IP</th>
                        <th onclick="sortBy('country')">国家</th>
                        <th onclick="sortBy('risk')">风险</th>
                        <th>GPT</th>
                        <th>Google</th>
                        <th>住宅</th>
                        <th>操作</th>
                    </tr></thead>
                    <tbody id="proxy-table"></tbody>
                </table>
                <div class="empty" id="proxy-empty">暂无代理</div>
                <div class="pagination" id="proxy-pagination"></div>
            </div>
        </div>
    </div>

    <!-- Tab Users -->
    <div class="tab-content" id="tab-users">
        <div class="section">
            <div class="section-title">用户管理 <span id="user-count" style="font-weight:400;font-size:13px;color:var(--text-dim)"></span></div>
            <div class="card" style="margin-bottom:16px">
                <div class="grid-2">
                   <div class="form-group" style="margin-bottom:0">
                       <label>新建密码用户</label>
                       <input id="new-user-username" placeholder="用户名" style="margin-bottom:8px">
                       <input id="new-user-password" type="password" placeholder="密码 (最少6位)" style="margin-bottom:8px">
                       <button class="btn btn-primary btn-sm" onclick="createPasswordUser()">创建用户</button>
                   </div>
                   <div class="form-group" style="margin-bottom:0">
                       <label>统计</label>
                       <div class="stat-value" id="s-users-panel">0</div>
                       <div class="stat-label">总用户数</div>
                   </div>
                </div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>来源</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
                    <tbody id="user-table"></tbody>
                </table>
                <div class="empty" id="user-empty">暂无用户</div>
            </div>
        </div>
    </div>

    <!-- Tab Settings -->
    <div class="tab-content" id="tab-settings">
        <!-- General Settings Card -->
        <div class="settings-card">
            <h3>通用设置</h3>
            <div class="form-group">
                <label>☑ 允许用户注册</label>
                <input type="checkbox" id="set-allow-registration">
            </div>
            <div class="grid-2">
                <div>
                   <div class="form-group">
                       <label>验证 URL</label>
                       <input id="set-validation-url" placeholder="https://www.bing.com">
                   </div>
                   <div class="form-group">
                       <label>验证超时 (秒)</label>
                       <input id="set-validation-timeout" type="number">
                   </div>
                   <div class="form-group">
                       <label>验证并发数</label>
                       <input id="set-validation-concurrency" type="number">
                   </div>
                </div>
                <div>
                   <div class="form-group">
                       <label>验证间隔 (分钟)</label>
                       <input id="set-validation-interval" type="number">
                   </div>
                   <div class="form-group">
                       <label>质检间隔 (分钟)</label>
                       <input id="set-quality-interval" type="number">
                   </div>
                   <div class="form-group">
                       <label>订阅自动刷新间隔 (分钟, 0=禁用)</label>
                       <input id="set-sub-refresh-interval" type="number">
                   </div>
                </div>
            </div>
            <div class="grid-2">
               <div class="form-group">
                   <label>验证批大小</label>
                   <input id="set-validation-batch" type="number">
               </div>
               <div class="form-group">
                   <label>连续错误剔除阈值</label>
                   <input id="set-error-threshold" type="number">
               </div>
            </div>
            <button class="btn btn-primary" onclick="saveGeneralSettings()">💾 保存通用设置</button>
        </div>

        <!-- Linux.do OAuth Card -->
        <div class="settings-card">
            <h3>Linux.do OAuth</h3>
            <div class="form-group">
                <label>☑ 启用 Linux.do OAuth 登录</label>
                <input type="checkbox" id="set-linuxdo-enabled">
            </div>
            <div class="form-group">
                <label>Linux.do 最低信任等级</label>
                <input type="number" id="set-linuxdo-trust" min="0" max="4">
                <small style="color:var(--text-dim)">Linux.do 社区的用户信任等级，0~4</small>
            </div>
            <div class="form-group">
                <label>Client ID</label>
                <input id="set-linuxdo-client-id">
            </div>
            <div class="form-group">
                <label>Client Secret</label>
                <input id="set-linuxdo-client-secret" type="password">
            </div>
            <div class="form-group">
                <label>Redirect URI</label>
                <input id="set-linuxdo-redirect-uri" placeholder="https://yourdomain.com/api/auth/linuxdo/callback">
            </div>
            <button class="btn btn-primary" onclick="saveLinuxDoSettings()">💾 保存 OAuth 设置</button>
        </div>
    </div>
</div>
</div>

<script>
let currentUser = null;
let allProxies = [];
let allSubscriptions = [];
let sortField = 'name';
let sortDir = 'asc';
let currentPage = 1;
const pageSize = 50;

async function api(path, opts={}) {
  try {
    opts.headers = { 'Content-Type': 'application/json', ...(opts.headers||{}) };
    const r = await fetch(path, opts);
    if (r.status === 401 || r.status === 403) {
      if(path !== '/api/auth/me') {
         window.location.href = '/';
      }
      return null;
    }
    return await r.json();
  }
  catch(e) { toast('错误: '+e.message); return null; }
}

function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  if(type==='error') t.style.borderLeft = '4px solid var(--danger)';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// --- Init & Tab logic ---
async function init() {
    try {
        const d = await api('/api/auth/me');
        if (!d || !d.username) {
            window.location.href = '/';
            return;
        }
        currentUser = d;
        if (d.role === 'user') {
            document.getElementById('app').style.display='block';
            document.getElementById('app').innerHTML = `
                <div class="access-denied">
                    <h2>权限不足</h2>
                    <p>您的账户角色为普通用户，无法访问管理后台。</p>
                    <a href="/">返回仪表盘</a>
                </div>`;
            return;
        }
        
        document.getElementById('app').style.display='block';
        initTab();
        refresh();
    } catch (e) {
        window.location.href = '/';
    }
}

function switchTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    let target = document.getElementById('tab-' + tabName);
    let targetTab = document.querySelector('.tab[data-tab="'+tabName+'"]');
    if(!target) { tabName='subscriptions'; target=document.getElementById('tab-subscriptions'); targetTab=document.querySelector('.tab[data-tab="subscriptions"]');}
    if(target) target.classList.add('active');
    if(targetTab) targetTab.classList.add('active');
    window.location.hash = tabName;
}

function initTab() {
    const hash = window.location.hash.replace('#', '') || 'subscriptions';
    switchTab(hash);
}

async function logout() {
   await fetch('/api/auth/logout', {method:'POST'});
   window.location.href = '/';
}

function refresh() { loadStats(); loadUsers(); loadSubscriptions(); loadProxies(); loadSettings(); }

// --- Stats & Proxies ---
async function loadStats() {
  const d = await api('/api/admin/stats');
  if(!d) return;
  document.getElementById('s-total').textContent = d.total_proxies??0;
  document.getElementById('s-valid').textContent = d.valid_proxies??0;
  document.getElementById('s-invalid').textContent = d.invalid_proxies??0;
  document.getElementById('s-untested').textContent = d.untested_proxies??0;
  document.getElementById('s-subs').textContent = d.subscriptions??0;
  document.getElementById('s-quality').textContent = d.quality_checked??0;
  if(d.by_type) document.getElementById('type-chips').innerHTML = Object.entries(d.by_type).map(([k,v])=>`<span class="type-chip">${esc(k)}: ${v}</span>`).join('');
}

function updateLocalQualityStats() {
  document.getElementById('s-quality').textContent = allProxies.filter(p => p.quality).length;
  document.getElementById('s-chatgpt').textContent = allProxies.filter(p => p.quality && p.quality.chatgpt).length;
  document.getElementById('s-google').textContent = allProxies.filter(p => p.quality && p.quality.google).length;
  document.getElementById('s-residential').textContent = allProxies.filter(p => p.quality && p.quality.is_residential).length;
}

async function loadProxies() {
  const d = await api('/api/admin/proxies');
  if(!d) return;
  allProxies = d.proxies||[];
  updateLocalQualityStats();
  renderProxies();
}

function renderProxies() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const status = document.getElementById('f-status').value;
  const type_ = document.getElementById('f-type').value;
  const quality = document.getElementById('f-quality').value;

  let filtered = allProxies.filter(p => {
    if(search && !p.name.toLowerCase().includes(search) && !p.server.toLowerCase().includes(search)) return false;
    if(status === 'disabled' && !p.is_disabled) return false;
    if(status && status !== 'disabled' && (p.is_disabled || p.status!==status)) return false;
    if(type_ && p.type!==type_) return false;
    if(quality==='chatgpt' && (!p.quality||!p.quality.chatgpt)) return false;
    if(quality==='google' && (!p.quality||!p.quality.google)) return false;
    if(quality==='residential' && (!p.quality||!p.quality.is_residential)) return false;
    return true;
  });

  filtered.sort((a,b) => {
    let va, vb;
    switch(sortField) {
      case 'name': va=a.name; vb=b.name; break;
      case 'type': va=a.type; vb=b.type; break;
      case 'server': va=a.server; vb=b.server; break;
      case 'is_valid': va=a.is_disabled?3:a.status==='valid'?0:a.status==='untested'?1:2; vb=b.is_disabled?3:b.status==='valid'?0:b.status==='untested'?1:2; break;
      case 'error_count': va=a.error_count; vb=b.error_count; break;
      case 'country': va=a.quality&&a.quality.country?a.quality.country:'zzz'; vb=b.quality&&b.quality.country?b.quality.country:'zzz'; break;
      case 'risk': va=a.quality?a.quality.risk_score:2; vb=b.quality?b.quality.risk_score:2; break;
      default: va=a.name; vb=b.name;
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;

  document.getElementById('proxy-count').textContent = `(${filtered.length})`;
  const tb = document.getElementById('proxy-table');
  const empty = document.getElementById('proxy-empty');
  if(!filtered.length) { tb.innerHTML=''; empty.style.display=''; renderPagination(0, 0); return; }
  empty.style.display='none';

  tb.innerHTML = filtered.slice(start, end).map(p => {
    const q = p.quality;
    const yes = '<span class="badge badge-valid">Y</span>';
    const no = '<span class="badge badge-invalid">N</span>';
    const na = '<span class="badge" style="background:rgba(148,163,184,.1);color:var(--text-dim)">-</span>';
    
    let riskBadge = na;
    if(q && q.risk_level && q.risk_level!=='Unknown') {
      const cls = q.risk_score<0.25?'badge-risk-low':q.risk_score<0.5?'badge-risk-med':'badge-risk-high';
      riskBadge = `<span class="badge ${cls}">${q.risk_level} ${(q.risk_score*100).toFixed(0)}%</span>`;
    }
    
    const statusBadge = p.is_disabled ? '<span class="badge badge-disabled">已禁用</span>' :
        (p.status==='valid'?'<span class="badge badge-valid">有效</span>':p.status==='untested'?'<span class="badge badge-untested">待检测</span>':'<span class="badge badge-invalid">无效</span>');
    const toggleBtn = p.is_disabled ? `<button class="btn-xs btn-success" onclick="toggleProxy('${esc(p.id)}')">启用</button>` : `<button class="btn-xs btn-warning" onclick="toggleProxy('${esc(p.id)}')">禁用</button>`;
    const validateBtn = !p.is_disabled ? `<button class="btn-xs" onclick="validateSingle('${esc(p.id)}')">验证</button>` : '';
    const qualityBtn = !p.is_disabled && p.status === 'valid' ? `<button class="btn-xs" onclick="qualitySingle('${esc(p.id)}')">质检</button>` : '';

    return `<tr class="${p.is_disabled ? 'row-disabled' : ''}">
      <td title="${esc(p.name)}" style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</td>
      <td><span class="badge badge-type">${esc(p.type)}</span></td>
      <td title="${esc(p.server)}:${p.port}" style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(p.server)}:${p.port}</td>
      <td>${statusBadge}</td>
      <td>${p.error_count}</td>
      <td>${q&&q.ip_address?esc(q.ip_address):'-'}</td>
      <td>${q&&q.country?esc(q.country):'-'}</td>
      <td>${riskBadge}</td>
      <td>${q?(q.chatgpt?yes:no):na}</td>
      <td>${q?(q.google?yes:no):na}</td>
      <td>${q?(q.is_residential?yes:no):na}</td>
      <td class="actions">
          ${toggleBtn} ${validateBtn} ${qualityBtn}
          <button class="btn-xs btn-danger" onclick="deleteProxy('${p.id}')">删除</button>
      </td>
    </tr>`;
  }).join('');
  renderPagination(filtered.length, totalPages);
}

function renderPagination(total, totalPages) {
  const container = document.getElementById('proxy-pagination');
  if(totalPages <= 1) { container.innerHTML=''; return; }
  let html = '';
  html += `<button ${currentPage<=1?'disabled':''} onclick="goPage(1)">&laquo;</button>`;
  html += `<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">&lsaquo;</button>`;
  const maxVisible = 7;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible/2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  if(endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);
  if(startPage > 1) html += `<span class="page-info">...</span>`;
  for(let i = startPage; i <= endPage; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if(endPage < totalPages) html += `<span class="page-info">...</span>`;
  html += `<button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${currentPage+1})">&rsaquo;</button>`;
  html += `<button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${totalPages})">&raquo;</button>`;
  html += `<span class="page-info">${(currentPage-1)*pageSize+1}-${Math.min(currentPage*pageSize,total)} / ${total}</span>`;
  container.innerHTML = html;
}

function goPage(page) { currentPage = page; renderProxies(); }
function sortBy(field) { if(sortField===field) sortDir = sortDir==='asc'?'desc':'asc'; else { sortField=field; sortDir='asc'; } renderProxies(); }

async function toggleProxy(id) { await api('/api/admin/proxies/'+id+'/toggle', { method: 'POST' }); loadProxies(); }
async function validateSingle(id) { await api('/api/admin/proxies/'+id+'/validate', { method: 'POST' }); toast('验证已启动'); setTimeout(loadProxies,3000);}
async function qualitySingle(id) { await api('/api/admin/proxies/'+id+'/quality', { method: 'POST' }); toast('质量检测已启动'); setTimeout(loadProxies,5000);}
async function deleteProxy(id) { if(confirm('确定删除该代理？')) { await api('/api/admin/proxies/'+id, {method:'DELETE'}); toast('已删除'); loadProxies(); } }

async function triggerValidation() { toast('正在启动验证...'); await api('/api/admin/validate', {method:'POST'}); }
async function triggerQualityCheck() { toast('正在启动质量检测...'); await api('/api/admin/quality-check', {method:'POST'}); }
async function cleanupProxies() { if(confirm('确定清理高错误代理？')) { const d=await api('/api/admin/proxies/cleanup', {method:'POST'}); if(d) toast(d.message); refresh(); } }
async function cleanupUselessProxies() {
  const targets = allProxies.filter(p => p.quality && !p.quality.chatgpt && !p.quality.google && !p.quality.is_residential);
  if(!targets.length) return toast('没有三不通代理');
  if(confirm(`确定删除 ${targets.length} 个三不通代理？`)) {
    let deleted = 0;
    for(const p of targets) { const d = await api('/api/admin/proxies/'+p.id, {method:'DELETE'}); if(d && !d.error) deleted++; }
    toast(`已删除 ${deleted} 个代理`); refresh();
  }
}

// --- Subscriptions ---
async function loadSubscriptions() {
  const d = await api('/api/subscriptions');
  if(!d) return;
  allSubscriptions = d.subscriptions||[];
  const tb = document.getElementById('sub-table');
  const empty = document.getElementById('sub-empty');
  if(!allSubscriptions.length) { tb.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  tb.innerHTML = allSubscriptions.map(s=>`<tr id="sub-${s.id}">
    <td>${esc(s.name)} <span class="badge badge-type" style="margin-left:4px">${esc(s.sub_type)}</span></td>
    <td class="url-cell">${esc(s.url||'(文本配置)')}</td>
    <td>${s.proxy_count}</td>
    <td class="btn-group">
      <button class="btn btn-xs" onclick="editSubscription('${esc(s.id)}')">编辑</button>
      <button class="btn btn-xs btn-primary" onclick="refreshSub('${esc(s.id)}')">刷新</button>
      <button class="btn btn-xs btn-danger" onclick="deleteSub('${esc(s.id)}')">删除</button>
    </td>
  </tr>`).join('');
}

async function adminAddSubscription() {
  const name = document.getElementById('add-sub-name').value.trim();
  const subType = document.getElementById('add-sub-type').value;
  const url = document.getElementById('add-sub-url').value.trim();
  const content = document.getElementById('add-sub-content').value.trim();
  if (!name) return toast('请输入名称', 'error');
  if (!url && !content) return toast('请输入 URL 或粘贴内容', 'error');
  const body = { name, type: subType };
  if (url) body.url = url; else body.content = content;
  toast('正在添加...');
  const d = await api('/api/subscriptions', { method: 'POST', body: JSON.stringify(body) });
  if (d && d.subscription) {
    toast(`已添加 ${d.proxies_added} 个代理`);
    ['add-sub-name','add-sub-url','add-sub-content'].forEach(i=>document.getElementById(i).value='');
    refresh();
  } else if (d && d.error) toast('错误: '+d.error, 'error');
}

function editSubscription(id) {
    const row = document.getElementById('sub-' + id);
    const sub = allSubscriptions.find(s => s.id === id);
    if(!sub) return;
    row.innerHTML = `
        <td>
           <input id="edit-name-${id}" value="${esc(sub.name)}" class="input-sm" style="margin-bottom:4px">
           <div><span class="badge badge-type">${esc(sub.sub_type)}</span></div>
        </td>
        <td><input id="edit-url-${id}" value="${esc(sub.url || '')}" class="input-sm url-cell" placeholder="若手动配置则留空"></td>
        <td>${sub.proxy_count}</td>
        <td class="btn-group">
            <button class="btn-xs btn-success" onclick="saveSubscription('${id}')">保存</button>
            <button class="btn-xs" onclick="loadSubscriptions()">取消</button>
        </td>`;
}

async function saveSubscription(id) {
    const name = document.getElementById('edit-name-' + id).value;
    const url = document.getElementById('edit-url-' + id).value;
    const resp = await fetch('/api/subscriptions/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url: url || null }),
    });
    if (resp.ok) { toast('订阅已更新'); loadSubscriptions(); loadProxies(); }
    else { const d = await resp.json(); toast('更新失败: '+d.error, 'error'); }
}

async function refreshSub(id) { toast('正在刷新...'); const d = await api('/api/subscriptions/'+id+'/refresh', {method:'POST'}); if(d) toast('新增 '+d.proxies_added+' 代理'); refresh(); }
async function deleteSub(id) { if(confirm('确定删除该订阅及其代理？')) { await api('/api/subscriptions/'+id, {method:'DELETE'}); toast('已删除'); refresh(); } }

// --- Users ---
async function loadUsers() {
  const d = await api('/api/admin/users');
  if(!d) return;
  document.getElementById('s-users-panel').textContent = d.total ?? 0;
  document.getElementById('user-count').textContent = d.total ? `(${d.total})` : '';
  const tb = document.getElementById('user-table');
  const empty = document.getElementById('user-empty');
  if(!d.users||!d.users.length) { tb.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  tb.innerHTML = d.users.map(u => {
    const roleSelect = canChangeRole(u)
        ? `<select onchange="changeRole('${esc(u.id)}', this.value)" class="input-sm" style="width:auto">
            <option value="user" ${u.role === 'user' ? 'selected' : ''}>普通用户</option>
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>管理员</option>
            ${currentUser.role === 'super_admin' ? `<option value="super_admin" ${u.role === 'super_admin' ? 'selected' : ''}>超级管理员</option>` : ''}
           </select>`
        : `<span class="badge ${u.role === 'super_admin'?'badge-danger':u.role==='admin'?'badge-warn':'badge-valid'}">${roleText(u.role)}</span>`;

    const banBtn = u.is_banned ? `<button class="btn-xs btn-success" onclick="unbanUser('${esc(u.id)}')">解封</button>` : `<button class="btn-xs btn-warning" onclick="banUser('${esc(u.id)}')">封禁</button>`;
    const deleteBtn = canDelete(u) ? `<button class="btn-xs btn-danger" onclick="deleteUser('${esc(u.id)}')">删除</button>` : '';
    
    return `<tr>
      <td>${esc(u.id.substring(0,8))}..</td>
      <td>${esc(u.username)}</td>
      <td>${roleSelect}</td>
      <td>${u.auth_source==='password'?'<span class="badge badge-type">密码</span>':'<span class="badge badge-valid">OAuth</span>'}</td>
      <td>${u.is_banned?'<span class="badge badge-banned">已封禁</span>':'<span class="badge badge-active">正常</span>'}</td>
      <td>${new Date(u.created_at).toLocaleString()}</td>
      <td class="btn-group">
        ${banBtn}
        ${deleteBtn}
      </td>
    </tr>`;
  }).join('');
}

function roleText(r) { return r==='super_admin'?'超级管理员':r==='admin'?'管理员':'普通用户'; }
function canChangeRole(user) {
    if (user.id === currentUser.id) return false;
    if (currentUser.role === 'super_admin') return true;
    if (currentUser.role === 'admin' && user.role !== 'super_admin') return true;
    return false;
}
function canDelete(user) {
    if (user.id === currentUser.id) return false;
    if (currentUser.role === 'super_admin') return true;
    if (currentUser.role === 'admin' && user.role === 'user') return true;
    return false;
}

async function changeRole(id, role) {
    const r = await fetch('/api/admin/users/' + id + '/role', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role }) });
    if (r.ok) toast('角色已更新'); else { const d=await r.json(); toast(d.error||'操作失败', 'error'); }
    loadUsers();
}
async function deleteUser(id) { if(confirm('确定删除该用户？该操作不可撤销。')) { await api('/api/admin/users/'+id, {method:'DELETE'}); toast('已删除'); loadUsers(); } }
async function banUser(id) { if(confirm('确定封禁该用户？用户将被强制下线。')) { await api('/api/admin/users/'+id+'/ban', {method:'POST'}); toast('已封禁'); loadUsers(); } }
async function unbanUser(id) { await api('/api/admin/users/'+id+'/unban', {method:'POST'}); toast('已解封'); loadUsers(); }

async function createPasswordUser() {
  const username = document.getElementById('new-user-username').value.trim();
  const password = document.getElementById('new-user-password').value;
  if (!username || password.length<6) return toast('请输入合法信息', 'error');
  const d = await api('/api/admin/users/create', { method: 'POST', body: JSON.stringify({ username, password }) });
  if (d && d.user) { toast('已创建: '+d.user.username); document.getElementById('new-user-username').value=''; document.getElementById('new-user-password').value=''; loadUsers(); }
  else if (d && d.error) toast(d.error, 'error');
}

// --- Settings ---
async function loadSettings() {
  const d = await api('/api/admin/settings');
  if(!d) return;
  const mapList = {
      'allow_registration': 'set-allow-registration',
      'validation_url': 'set-validation-url',
      'validation_timeout_secs': 'set-validation-timeout',
      'validation_concurrency': 'set-validation-concurrency',
      'validation_interval_mins': 'set-validation-interval',
      'validation_batch_size': 'set-validation-batch',
      'validation_error_threshold': 'set-error-threshold',
      'quality_interval_mins': 'set-quality-interval',
      'subscription_auto_refresh_interval_mins': 'set-sub-refresh-interval',
      'linuxdo_oauth_enabled': 'set-linuxdo-enabled',
      'linuxdo_min_trust_level': 'set-linuxdo-trust',
      'linuxdo_client_id': 'set-linuxdo-client-id',
      'linuxdo_client_secret': 'set-linuxdo-client-secret',
      'linuxdo_redirect_uri': 'set-linuxdo-redirect-uri'
  };
  for(const k in mapList) {
    const el = document.getElementById(mapList[k]);
    if(!el) continue;
    if(el.type === 'checkbox') el.checked = d[k] === 'true';
    else el.value = d[k] || '';
  }
}

async function saveGeneralSettings() {
    const payload = {
        allow_registration: document.getElementById('set-allow-registration').checked.toString(),
        validation_url: document.getElementById('set-validation-url').value,
        validation_timeout_secs: document.getElementById('set-validation-timeout').value,
        validation_concurrency: document.getElementById('set-validation-concurrency').value,
        validation_interval_mins: document.getElementById('set-validation-interval').value,
        validation_batch_size: document.getElementById('set-validation-batch').value,
        validation_error_threshold: document.getElementById('set-error-threshold').value,
        quality_interval_mins: document.getElementById('set-quality-interval').value,
        subscription_auto_refresh_interval_mins: document.getElementById('set-sub-refresh-interval').value,
    };
    const d = await api('/api/admin/settings', { method: 'PUT', body: JSON.stringify(payload) });
    if(d && !d.error) { toast('✅ 通用设置已保存'); }
}

async function saveLinuxDoSettings() {
    const payload = {
        linuxdo_oauth_enabled: document.getElementById('set-linuxdo-enabled').checked.toString(),
        linuxdo_min_trust_level: document.getElementById('set-linuxdo-trust').value,
        linuxdo_client_id: document.getElementById('set-linuxdo-client-id').value,
        linuxdo_client_secret: document.getElementById('set-linuxdo-client-secret').value,
        linuxdo_redirect_uri: document.getElementById('set-linuxdo-redirect-uri').value,
    };
    const d = await api('/api/admin/settings', { method: 'PUT', body: JSON.stringify(payload) });
    if(d && !d.error) { toast('✅ OAuth 设置已保存'); }
}
