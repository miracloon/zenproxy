services:
  zenproxy-client:
    build:
      context: ../../
      dockerfile: docker/client/Dockerfile
    image: ${DOCKERHUB_USERNAME:-zenproxy}/zenproxy-client:${IMAGE_TAG:-latest}
    container_name: zenproxy-client
    restart: unless-stopped
    volumes:
      - ./config/config.json:/app/config.json:ro
      - ./data:/app/data
    ports:
      - "${CLASH_API_PORT:-9090}:9090"
      - "${PROXY_PORT_START:-60001}-${PROXY_PORT_END:-65535}:${PROXY_PORT_START:-60001}-${PROXY_PORT_END:-65535}"
