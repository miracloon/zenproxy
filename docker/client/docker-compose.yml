services:
  zenproxy-client:
    build:
      context: ../../
      dockerfile: docker/client/Dockerfile
    image: zenproxy/zenproxy-client:latest
    container_name: zenproxy-client
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/config.json:/app/config.json:ro
      - ./data:/app/data
    environment:
      - PROXY_PORT_START=60001
      - PROXY_PORT_END=65535
